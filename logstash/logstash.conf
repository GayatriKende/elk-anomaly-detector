input {
  beats {
    port => 5044
  }
}

filter {
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:log_level} %{WORD:method} %{URIPATH:url} status=%{NUMBER:status_code} response_time=%{NUMBER:response_time}ms ip=%{IP:client_ip}"
    }
    tag_on_failure => ["_grokparsefailure"]
  }

  # Convert string numbers to actual numbers
  mutate {
    convert => {
      "response_time" => "integer"
      "status_code"   => "integer"
    }
  }

  # Add a flag for error logs
  if [log_level] == "ERROR" or [log_level] == "WARNING" {
    mutate {
      add_field => { "is_error" => "true" }
    }
  } else {
    mutate {
      add_field => { "is_error" => "false" }
    }
  }

  # Parse the timestamp
  date {
    match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss,SSS"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "app-logs-%{+YYYY.MM.dd}"
  }

  # Also print to console for debugging
  stdout {
    codec => rubydebug
  }
}
